# Knit user configuration
# This file is app-managed. Edit it if you want, but Knit may rewrite comments/order on save.
# Secrets do not belong here. Use .env or your OS keychain for API keys and tokens.


[config]
local_profile = "local-default"
environment_name = "local-dev"
# optional build identifier shown in runtime state
# build_id = ""
# optional managed deployment pin
# version_pin = ""
# optional deployment identifier
# managed_deployment_id = ""
transcription_mode = "faster_whisper"
allow_remote_stt = false
allow_remote_submit = false
control_capabilities = ["capture", "submit", "config", "purge", "read"]
# config_locked = false
# capture_settings_locked = false
window_scoped_capture = false
browser_app_first = false
ui_runtime = "native_tray_plus_local_web_ui"
# auto_start_enabled = false
# pointer_sample_hz = 30
# video_enabled_default = false
video_mode = "event_triggered"
audio_retention = "0s"
screenshot_retention = "336h0m0s"
video_retention = "168h0m0s"
transcript_retention = "720h0m0s"
structured_retention = "720h0m0s"
purge_schedule = false
purge_interval = "30m0s"
# artifact_max_files = 2000
# optional explicit outbound allowlist
# outbound_allowlist = []
# optional explicit outbound blocklist
# blocked_targets = []
# optional explicit submit-provider allowlist
# allowed_submit_providers = []
# optional SIEM JSONL mirror path
# siem_log_path = ""

[runtime_codex]
default_provider = "codex_cli"
cli_adapter_cmd = "'/Users/chadsylvester/SW_Dev/Lumo_Barkley/scripts/knit-codex-cli-adapter.sh'"
# cli_timeout_seconds = 600
claude_cli_adapter_cmd = "'/Users/chadsylvester/SW_Dev/Lumo_Barkley/scripts/knit-claude-cli-adapter.sh'"
# claude_cli_timeout_seconds = 600
opencode_cli_adapter_cmd = "'/Users/chadsylvester/SW_Dev/Lumo_Barkley/scripts/knit-opencode-cli-adapter.sh'"
# opencode_cli_timeout_seconds = 600
submit_execution_mode = "series"
codex_workdir = "/Users/chadsylvester/SW_Dev/Lumo_Barkley"
# codex_output_dir = ""
codex_sandbox = "read-only"
codex_approval_policy = "untrusted"
# codex_profile = ""
# codex_model = ""
# codex_reasoning_effort = ""
# openai_base_url = ""
# codex_api_timeout_seconds = 60
# openai_org_id = ""
# openai_project_id = ""
# anthropic_base_url = ""
# claude_api_timeout_seconds = 60
# claude_api_model = ""
# post_submit_rebuild_cmd = ""
# post_submit_verify_cmd = ""
# post_submit_timeout_seconds = 600
# codex_skip_git_repo_check = true

[runtime_transcription]
mode = "faster_whisper"
# base_url = ""
model = "small"
# device = ""
# compute_type = ""
# language = ""
# local_command = ""
# timeout_seconds = 0

[audio]
mode = "always_on"
input_device_id = "default"
# muted = false
# paused = false
# level_min = 0.02
# level_max = 0.95

[prompts]
default_template = "implement_changes"
