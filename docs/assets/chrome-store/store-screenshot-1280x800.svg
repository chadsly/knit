<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Knit Browser Composer store screenshot</title>
  <desc id="desc">A browser window with a Knit page open and the Browser Composer side panel visible on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1523"/>
      <stop offset="100%" stop-color="#142235"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78ead7"/>
      <stop offset="100%" stop-color="#2ea69a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#03101d" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="150" cy="124" r="180" fill="#17304a" opacity="0.28"/>
  <circle cx="1140" cy="678" r="220" fill="#123048" opacity="0.22"/>
  <g filter="url(#shadow)">
    <rect x="56" y="64" width="1168" height="672" rx="28" fill="#0f1a29" stroke="#243449"/>
    <rect x="56" y="64" width="1168" height="56" rx="28" fill="#152233"/>
    <rect x="56" y="92" width="1168" height="28" fill="#152233"/>
    <circle cx="88" cy="92" r="8" fill="#ff6d6d"/>
    <circle cx="114" cy="92" r="8" fill="#f6c95f"/>
    <circle cx="140" cy="92" r="8" fill="#65d285"/>
    <rect x="178" y="80" width="484" height="24" rx="12" fill="#0d1725" stroke="#243449"/>
    <text x="194" y="97" fill="#8fa1b8" font-size="12" font-family="Arial, sans-serif">http://127.0.0.1:7777 • Knit</text>
    <rect x="82" y="144" width="790" height="560" rx="22" fill="#132233" stroke="#223449"/>
    <text x="112" y="190" fill="#eef4fb" font-size="24" font-weight="700" font-family="Arial, sans-serif">Recommender Metrics Review</text>
    <text x="112" y="222" fill="#9cb0c8" font-size="14" font-family="Arial, sans-serif">Keep feedback tied to the page you are reviewing.</text>

    <rect x="112" y="254" width="330" height="128" rx="18" fill="#0f1a29" stroke="#223449"/>
    <text x="136" y="286" fill="#87f1dc" font-size="12" font-weight="700" font-family="Arial, sans-serif">CURRENT PAGE</text>
    <text x="136" y="318" fill="#eef4fb" font-size="26" font-weight="700" font-family="Arial, sans-serif">Recommendations</text>
    <text x="136" y="350" fill="#a7b9cd" font-size="16" font-family="Arial, sans-serif">Capture feedback without leaving the tab.</text>

    <rect x="466" y="254" width="372" height="128" rx="18" fill="#0f1a29" stroke="#223449"/>
    <text x="490" y="286" fill="#87f1dc" font-size="12" font-weight="700" font-family="Arial, sans-serif">WHY TEAMS USE IT</text>
    <text x="490" y="320" fill="#eef4fb" font-size="18" font-family="Arial, sans-serif">• Notes stay attached to the active page</text>
    <text x="490" y="350" fill="#eef4fb" font-size="18" font-family="Arial, sans-serif">• Snapshots, voice, and tab video are user-triggered</text>

    <rect x="112" y="410" width="726" height="266" rx="18" fill="#0f1a29" stroke="#223449"/>
    <text x="136" y="442" fill="#87f1dc" font-size="12" font-weight="700" font-family="Arial, sans-serif">EXAMPLE PAGE CONTEXT</text>
    <rect x="136" y="470" width="304" height="172" rx="14" fill="#13283f" stroke="#2b4967"/>
    <rect x="154" y="492" width="270" height="18" rx="9" fill="#c7f7ee" opacity="0.7"/>
    <rect x="154" y="524" width="196" height="14" rx="7" fill="#2ea69a" opacity="0.45"/>
    <rect x="154" y="552" width="248" height="12" rx="6" fill="#27405f"/>
    <rect x="154" y="574" width="220" height="12" rx="6" fill="#27405f"/>
    <rect x="154" y="608" width="110" height="20" rx="10" fill="url(#accent)"/>
    <text x="185" y="622" fill="#0b1724" font-size="12" font-weight="700" font-family="Arial, sans-serif">METRICS</text>

    <rect x="464" y="470" width="350" height="76" rx="14" fill="#13283f" stroke="#2b4967"/>
    <text x="488" y="498" fill="#eef4fb" font-size="16" font-weight="700" font-family="Arial, sans-serif">Browser-grounded request</text>
    <text x="488" y="525" fill="#a7b9cd" font-size="14" font-family="Arial, sans-serif">Move the metrics detail into its own tab and keep</text>
    <text x="488" y="546" fill="#a7b9cd" font-size="14" font-family="Arial, sans-serif">the recommender context visible next to it.</text>

    <rect x="464" y="566" width="168" height="76" rx="14" fill="#13283f" stroke="#2b4967"/>
    <rect x="654" y="566" width="160" height="76" rx="14" fill="#13283f" stroke="#2b4967"/>
    <text x="486" y="608" fill="#eef4fb" font-size="14" font-family="Arial, sans-serif">Snapshot attached</text>
    <text x="676" y="608" fill="#eef4fb" font-size="14" font-family="Arial, sans-serif">Voice note ready</text>

    <rect x="898" y="144" width="292" height="560" rx="22" fill="#f6f0e8" stroke="#d8c9b5"/>
    <text x="922" y="188" fill="#232d38" font-size="18" font-weight="700" font-family="Arial, sans-serif">Browser Composer</text>
    <text x="922" y="216" fill="#5e6a78" font-size="14" font-family="Arial, sans-serif">Tab-bound capture without jumping back</text>
    <text x="922" y="236" fill="#5e6a78" font-size="14" font-family="Arial, sans-serif">to the main UI.</text>

    <rect x="922" y="244" width="128" height="34" rx="17" fill="#dff7ef" stroke="#9fd8c4"/>
    <text x="945" y="266" fill="#167b6f" font-size="13" font-weight="700" font-family="Arial, sans-serif">Session active</text>

    <g transform="translate(922 300)">
      <rect width="58" height="42" rx="12" fill="#efe5d6"/><text x="22" y="27" fill="#223449" font-size="18" font-family="Arial, sans-serif">✎</text>
      <rect x="70" width="58" height="42" rx="12" fill="#efe5d6"/><text x="91" y="27" fill="#223449" font-size="18" font-family="Arial, sans-serif">⌘</text>
      <rect x="140" width="58" height="42" rx="12" fill="#efe5d6"/><text x="162" y="27" fill="#223449" font-size="18" font-family="Arial, sans-serif">🎙</text>
      <rect x="210" width="58" height="42" rx="12" fill="#efe5d6"/><text x="232" y="27" fill="#223449" font-size="18" font-family="Arial, sans-serif">▣</text>
    </g>

    <text x="922" y="368" fill="#232d38" font-size="14" font-weight="700" font-family="Arial, sans-serif">Typed note</text>
    <rect x="922" y="382" width="244" height="104" rx="16" fill="#fffdfb" stroke="#d8c9b5"/>
    <text x="942" y="416" fill="#6b7583" font-size="15" font-family="Arial, sans-serif">Describe the change in</text>
    <text x="942" y="438" fill="#6b7583" font-size="15" font-family="Arial, sans-serif">plain language.</text>
    <text x="942" y="460" fill="#6b7583" font-size="15" font-family="Arial, sans-serif">Snapshots and media stay attached.</text>

    <g transform="translate(922 512)">
      <rect width="114" height="40" rx="12" fill="#efe5d6"/><text x="46" y="25" fill="#223449" font-size="18" font-family="Arial, sans-serif">▶</text>
      <rect x="130" width="114" height="40" rx="12" fill="#efe5d6"/><text x="173" y="25" fill="#223449" font-size="18" font-family="Arial, sans-serif">◉</text>
      <rect y="54" width="74" height="40" rx="12" fill="url(#accent)"/><text x="30" y="79" fill="#0b1724" font-size="18" font-family="Arial, sans-serif">↑</text>
      <rect x="84" y="54" width="74" height="40" rx="12" fill="#efe5d6"/><text x="115" y="79" fill="#223449" font-size="18" font-family="Arial, sans-serif">🗑</text>
      <rect x="168" y="54" width="76" height="40" rx="12" fill="#f4d2d2"/><text x="198" y="79" fill="#b14646" font-size="18" font-family="Arial, sans-serif">✕</text>
    </g>

    <text x="922" y="634" fill="#167b6f" font-size="14" font-family="Arial, sans-serif">Snapshot queued. Add a typed note,</text>
    <text x="922" y="654" fill="#167b6f" font-size="14" font-family="Arial, sans-serif">voice note, or tab video next.</text>
    <rect x="922" y="668" width="244" height="32" rx="12" fill="#fffdfb" stroke="#d8c9b5"/>
    <text x="940" y="689" fill="#6b7583" font-size="13" font-family="Arial, sans-serif">Preview appears here.</text>
  </g>
</svg>
