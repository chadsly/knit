<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" role="img" aria-labelledby="title desc">
  <title id="title">Knit promo tile</title>
  <desc id="desc">A promo tile showing the browser composer side panel and a short tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1724"/>
      <stop offset="100%" stop-color="#17304a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78ead7"/>
      <stop offset="100%" stop-color="#2ea69a"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" rx="28" fill="url(#bg)"/>
  <circle cx="58" cy="62" r="26" fill="url(#accent)"/>
  <text x="95" y="66" fill="#f4f8fc" font-size="24" font-weight="700" font-family="Arial, sans-serif">Knit</text>
  <text x="95" y="92" fill="#78ead7" font-size="16" font-weight="700" font-family="Arial, sans-serif">Browser Composer</text>
  <text x="34" y="130" fill="#aac0d7" font-size="18" font-family="Arial, sans-serif">Capture browser-grounded</text>
  <text x="34" y="154" fill="#aac0d7" font-size="18" font-family="Arial, sans-serif">requests without leaving</text>
  <text x="34" y="178" fill="#aac0d7" font-size="18" font-family="Arial, sans-serif">the page.</text>
  <rect x="274" y="34" width="134" height="212" rx="18" fill="#f6f0e8" stroke="#d8c9b5"/>
  <text x="290" y="64" fill="#232d38" font-size="13" font-weight="700" font-family="Arial, sans-serif">Browser Composer</text>
  <rect x="290" y="82" width="74" height="24" rx="12" fill="#dff7ef"/>
  <text x="304" y="98" fill="#167b6f" font-size="12" font-weight="700" font-family="Arial, sans-serif">Live tab</text>
  <g transform="translate(290 120)">
    <rect width="30" height="28" rx="8" fill="#efe5d6"/>
    <rect x="38" width="30" height="28" rx="8" fill="#efe5d6"/>
    <rect x="76" width="30" height="28" rx="8" fill="#efe5d6"/>
    <rect x="114" width="30" height="28" rx="8" fill="#efe5d6"/>
  </g>
  <rect x="290" y="162" width="100" height="42" rx="12" fill="#fffdfb" stroke="#d8c9b5"/>
  <text x="301" y="188" fill="#6b7583" font-size="11" font-family="Arial, sans-serif">Type, snapshot,</text>
  <text x="301" y="202" fill="#6b7583" font-size="11" font-family="Arial, sans-serif">voice, or tab video.</text>
  <rect x="290" y="216" width="72" height="18" rx="9" fill="url(#accent)"/>
  <rect x="372" y="216" width="18" height="18" rx="9" fill="#f4d2d2"/>
</svg>
